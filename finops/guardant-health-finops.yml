meters:
- name: clinical_tests
  description: Clinical assays ordered/resulted, billed via payer reimbursement (illustrative cost dimension, not a published API meter).
  unit: tests
  aggregation: sum
  dimensions:
  - account
  - assay
- name: partner_integration
  description: Institutional EMR integration agreements (illustrative cost dimension).
  unit: contracts
  aggregation: sum
  dimensions:
  - account
- name: biopharma_agreements
  description: Biopharma data/software licensing (GuardantINFORM, GuardantConnect, Guardant Galaxy) (illustrative cost dimension).
  unit: contracts
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: No public API usage exports exist; track clinical test volumes and contract spend via internal procurement and EMR reporting.
- name: Allocation
  description: Map test ordering and integration costs to clinical departments or biopharma programs.
- name: Optimization
  description: Optimize via contract negotiation and appropriate test utilization, not API-level metering.
- name: Accountability
  description: Assign owners for partner and biopharma agreements; review contractual spend on the agreement cycle.
