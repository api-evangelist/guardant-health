description: >-
  FinOps view of Guardant Health. Guardant Health does not bill a usage-metered
  public API; there are no per-call, per-token or per-request API charges to
  manage. Costs are clinical (per-test reimbursement for assays) and contractual
  (institutional EMR integration and biopharma data/software agreements for
  GuardantINFORM, GuardantConnect and Guardant Galaxy). This artifact records
  that no public API billing model exists to align to FOCUS.
notes: >-
  Reconciled false: no public, usage-based API billing exists. Meters below are
  illustrative cost dimensions a partner might track internally; they are not
  published Guardant billing meters. Update on reconciliation if a public API
  billing model is introduced.
