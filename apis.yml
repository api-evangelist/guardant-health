    not a public self-serve API; no public base URL or OpenAPI is published.
- aid: guardant-health:guardant-health-results-delivery
  name: Guardant Health Results Delivery Integration
  tags:
  - EMR Integration
  - Results
  - HL7
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://guardanthealth.com/precision-oncology/for-institutional-partners/emr-integration-services/
