aid: guardant-health
url: https://raw.githubusercontent.com/api-evangelist/guardant-health/refs/heads/main/apis.yml
name: Guardant Health
kind: company
description: >-
  Guardant Health is a precision oncology company whose blood- and tissue-based
  liquid biopsy tests (Guardant360, Guardant Reveal, Guardant Shield,
  GuardantINFINITY) detect cancer and guide treatment. Its integration surface
  is partner- and EMR-based - electronic test ordering and results delivery
  through Epic Aura and Flatiron OncoEMR, patient portals (MyGuardant, My Data),
  and biopharma data platforms (GuardantINFORM, GuardantConnect, Guardant
  Galaxy). No public self-serve developer API is documented.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Healthcare
- Precision Oncology
- Liquid Biopsy
- Genomics
- EMR Integration
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
